<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LindaKukuOS </title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231a3c2a'/%3E%3Cellipse cx='16' cy='19' rx='6' ry='8' fill='%23e8a317'/%3E%3C/svg%3E">
    <!-- Google Font (Inter) for a clean, modern look -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />

    <style>
        /* ----- Reset & Base ----- */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f6f8f7;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
            line-height: 1.5;
            color: #1e2b26;
        }

        /* ----- Card / Section Container ----- */
        .landing-section {
            max-width: 820px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(30, 43, 38, 0.08), 0 8px 24px rgba(30, 43, 38, 0.04);
            padding: 2.5rem 2.5rem 3rem;
            transition: box-shadow 0.3s ease;
        }

        .landing-section:hover {
            box-shadow: 0 28px 72px rgba(30, 43, 38, 0.10), 0 10px 32px rgba(30, 43, 38, 0.05);
        }

        /* ----- Logo Row (centered, text on new line) ----- */
        .logo-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 2rem;
            gap: 0.5rem;
        }

        .logo-row img {
            display: block;
            height: 100px;
            width: auto;
            object-fit: contain;
        }

        .logo-text .tagline {
            font-weight: 500;
            font-size: 0.9rem;
            color: #6b7f77;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        /* ----- Video Wrapper ----- */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            /* 16:9 ratio */
            border-radius: 20px;
            overflow: hidden;
            background: #0e1a15;
            box-shadow: 0 4px 16px rgba(30, 43, 38, 0.06);
            margin-bottom: 1.75rem;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        /* ----- Video Caption / Context ----- */
        .video-caption {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 2rem;
            padding: 0 0.25rem;
        }

        .video-caption svg {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            stroke: #1e4d3a;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            margin-top: 0.1rem;
        }

        .video-caption p {
            font-size: 0.9rem;
            color: #3e554c;
            font-weight: 400;
            letter-spacing: 0.01em;
        }

        .video-caption p strong {
            font-weight: 600;
            color: #1e2b26;
        }

        /* ----- Value Proposition (short) ----- */
        .value-prop {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem 2.5rem;
            background: #f3f6f4;
            padding: 1.25rem 1.5rem;
            border-radius: 60px;
            margin-bottom: 2rem;
            border: 1px solid #e2e9e5;
        }

        .value-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e2b26;
        }

        .value-item svg {
            width: 20px;
            height: 20px;
            stroke: #1e4d3a;
            fill: none;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        /* ----- CTA Row ----- */
        .cta-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1.25rem;
            padding-top: 0.25rem;
        }

        .cta-text {
            font-size: 0.95rem;
            color: #3e554c;
            font-weight: 400;
        }

        .cta-text span {
            font-weight: 600;
            color: #1e2b26;
        }

        /* ----- BUTTON with enhanced animations ----- */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: #1e4d3a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            padding: 0.85rem 2rem;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            text-decoration: none;
            letter-spacing: 0.01em;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
            transition: background 0.3s ease, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
            box-shadow: 0 4px 14px rgba(30, 77, 58, 0.25);
        }

        /* Pseudo-element for shine animation */
        .btn-primary::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s ease, transform 0.6s ease;
            transform: scale(0.8) rotate(0deg);
            pointer-events: none;
        }

        .btn-primary:hover::after {
            opacity: 1;
            transform: scale(1.2) rotate(8deg);
        }

        .btn-primary:hover {
            background: #143b2d;
            box-shadow: 0 8px 28px rgba(30, 77, 58, 0.35);
            transform: translateY(-3px) scale(1.02);
        }

        .btn-primary:active {
            transform: translateY(0) scale(0.97);
            box-shadow: 0 4px 12px rgba(30, 77, 58, 0.20);
            transition-duration: 0.08s;
        }

        .btn-primary svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .btn-primary:hover svg {
            transform: translateX(4px) scale(1.05);
        }

        /* ----- Iframe (past work) ----- */
        .past-work-iframe {
            margin-top: 2.5rem;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(30, 43, 38, 0.06);
            border: 1px solid #e8efeb;
        }

        .past-work-iframe iframe {
            display: block;
            width: 100%;
            height: 600px;
            border: 0;
        }

        /* ----- Responsive ----- */
        @media (max-width: 640px) {
            .landing-section {
                padding: 1.5rem 1.25rem 2rem;
                border-radius: 24px;
            }

            .logo-row {
                margin-bottom: 1.5rem;
                gap: 0.4rem;
            }

            .logo-row img {
                height: 72px;
            }

            .logo-text .tagline {
                font-size: 0.75rem;
            }

            .value-prop {
                flex-direction: column;
                align-items: center;
                gap: 0.75rem;
                border-radius: 32px;
                padding: 1rem 1.25rem;
            }

            .value-item {
                font-size: 0.85rem;
            }

            .cta-row {
                flex-direction: column;
                align-items: stretch;
                gap: 1rem;
            }

            .cta-text {
                text-align: center;
                font-size: 0.9rem;
            }

            .btn-primary {
                justify-content: center;
                padding: 0.8rem 1.5rem;
                font-size: 0.95rem;
                width: 100%;
                white-space: normal;
            }

            .video-caption {
                flex-direction: column;
                gap: 0.5rem;
            }

            .video-caption svg {
                margin-top: 0;
            }

            .past-work-iframe iframe {
                height: 400px;
            }
        }

        @media (max-width: 400px) {
            .landing-section {
                padding: 1rem 0.75rem 1.5rem;
                border-radius: 20px;
            }

            .logo-row img {
                height: 56px;
            }

            .past-work-iframe iframe {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <script>
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    const kb = (e.ctrlKey || e.metaKey) && ['c','u','s','a','p','x'].includes(e.key.toLowerCase());
    const dt = e.key === 'F12' || ((e.ctrlKey || e.metaKey) && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase()));
    if (kb || dt) e.preventDefault();
  });
  document.addEventListener('dragstart', e => e.preventDefault());
  document.addEventListener('selectstart', e => e.preventDefault());
  (function devDetect() {
    const threshold = 400;
    setInterval(() => {
      if (window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) {
        document.body.innerHTML = '<div style="height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;font-size:0.85rem;color:#6b6560;">Please refresh the page to continue.</div>';
      }
    }, 1200);
  })();
</script>

    <section class="landing-section" aria-label="Video sales letter and call to action">

        <!-- ====== LOGO ROW — centered, text on new line ====== -->
        <div class="logo-row">
            <img src="assets/grow-os-logo.png" alt="ChickenOS logo - Poultry Growing Operating System" />
            <div class="logo-text">
                <p class="tagline">Poultry Growing Operating System</p>
            </div>
        </div>

        <!-- ====== VIDEO EMBED (VSL) ====== -->
        <div class="video-wrapper">

            src="https://www.youtube.com/embed/nxroWsPj3YI?si=UrgzauQkyojk2vk6"
            title="Video Sales Letter – ChickenOS"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen
            loading="lazy">
        </iframe>
    </div>

    <!-- ====== VIDEO CAPTION ====== -->
    <div class="video-caption">
        <!-- Professional SVG: play / info icon -->
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="10" />

        </svg>
        <p>
            <strong>Watch the overview</strong> to see how LindaKukuOS streamlines

        </p>

    <!-- ====== SHORT VALUE PROPOSITION ====== -->
    <div class="value-prop">
        <div class="value-item">
            <svg viewBox="0 0 24 24">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                <polyline points="9 12 11 14 15 10" />
            </svg>
            <span>Data-driven flock management</span>
        </div>
        <div class="value-item">
            <svg viewBox="0 0 24 24">
                <rect x="2" y="7" width="20" height="14" rx="2" ry="2" />
                <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
            </svg>
            <span>End-to-end operational control</span>
        </div>
        <div class="value-item">
            <svg viewBox="0 0 24 24">

                <polyline points="12 6 12 12 16 14" />
            </svg>
            <span>Real-time growth analytics</span>
        </div>
    </div>

    <!-- ====== CTA ROW ====== -->
    <div class="cta-row">
        <div class="cta-text">
            <span>Ready to scale your flock?</span>
            &nbsp;Talk to our team today.
        </div>

        <!-- "Let's Talk" Button with enhanced animations -->
        <a href="https://tumakazi.com/schedule-call" class="btn-primary" role="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M22 2L11 13" />
                <path d="M22 2L15 22L11 13L2 9L22 2Z" />
            </svg>
            Let's Talk
        </a>
    </div>

    <!-- ====== PAST WORK IFRAME ====== -->
    <div class="past-work-iframe">
        <iframe src="https://grow-os-chicken-farming-articles.blogspot.com/" title="Past work and articles" loading="lazy"></iframe>
    </div>

</section>

</body>
</html>
